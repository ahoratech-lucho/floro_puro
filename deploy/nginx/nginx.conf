worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    # Security - hide nginx version
    server_tokens off;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=downloads:10m rate=1r/s;

    # Cache static assets
    map $uri $cache_control {
        ~*\.(webp|png|jpg|jpeg)$  "public, max-age=2592000, immutable";
        ~*\.(js|css|wasm)$        "public, max-age=604800";
        ~*\.json$                 "public, max-age=3600";
        default                   "no-cache";
    }

    server {
        listen 80;
        server_name radardelfloro.pe www.radardelfloro.pe _;

        root /var/www/radardelfloro;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Cache headers
        add_header Cache-Control $cache_control;

        # Block access to hidden files
        location ~ /\. {
            deny all;
            return 404;
        }

        # Landing page (static HTML)
        location / {
            limit_req zone=general burst=20 nodelay;
            try_files $uri $uri/ /index.html;
        }

        # APK download
        location /downloads/ {
            limit_req zone=downloads burst=3 nodelay;
            add_header Content-Disposition "attachment";
            expires 1d;
        }

        # Health check
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Block common attack paths
        location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|\.env|\.git) {
            deny all;
            return 404;
        }
    }
}
