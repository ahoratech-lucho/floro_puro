<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Radar del Floro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-2 text-red-700">🔒 Radar del Floro</h1>
    <p class="text-gray-500 text-center text-sm mb-6">Panel de Administración</p>

    <div id="error" class="hidden bg-red-50 text-red-600 p-3 rounded mb-4 text-sm">
      Contraseña incorrecta
    </div>

    <form method="POST" action="/admin/login">
      <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
      <input type="password" name="password" required autofocus
        class="w-full border border-gray-300 rounded px-3 py-2 mb-4 focus:ring-2 focus:ring-red-500 focus:outline-none"
        placeholder="Ingresa la contraseña">
      <button type="submit"
        class="w-full bg-red-600 text-white py-2 rounded font-medium hover:bg-red-700 transition">
        Ingresar
      </button>
    </form>
  </div>

  <script>
    if (location.search.includes('error=1')) document.getElementById('error').classList.remove('hidden');
  </script>
</body>
</html>
